name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  PNPM_VERSION: 9.12.0

jobs:
  setup:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: corepack prepare pnpm@${PNPM_VERSION} --activate
      - run: pnpm install --frozen-lockfile

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: corepack prepare pnpm@${PNPM_VERSION} --activate
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-lint-${{ github.sha }}
          restore-keys: turbo-lint-
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: corepack prepare pnpm@${PNPM_VERSION} --activate
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-typecheck-${{ github.sha }}
          restore-keys: turbo-typecheck-
      - run: pnpm typecheck

  test:
    name: Test
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: corepack prepare pnpm@${PNPM_VERSION} --activate
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-test-${{ github.sha }}
          restore-keys: turbo-test-
      - run: pnpm test

  rule-coverage:
    name: Rule Coverage Check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: corepack prepare pnpm@${PNPM_VERSION} --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx scripts/check-rule-coverage.ts
      - run: pnpm exec tsx scripts/build-rules.ts
      - name: Verify firestore.rules is not out of date
        run: |
          if ! git diff --exit-code -- infra/firebase/firestore.rules; then
            echo "::error::firestore.rules is out of sync with scripts/build-rules.ts. Run 'pnpm exec tsx scripts/build-rules.ts' locally and commit."
            exit 1
          fi

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: corepack prepare pnpm@${PNPM_VERSION} --activate
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-build-${{ github.sha }}
          restore-keys: turbo-build-
      - run: pnpm build

  rules-check:
    name: Firestore Rules Check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - run: corepack enable
      - run: corepack prepare pnpm@${PNPM_VERSION} --activate
      - run: pnpm install --frozen-lockfile
      - name: Validate Firestore rules load
        run: pnpm dlx firebase-tools emulators:exec --only firestore 'exit 0' --project demo-bantayog-alert

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, staging, prod]
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8
      - run: terraform fmt -recursive -check
      - run: terraform init -backend=false
      - run: terraform validate
